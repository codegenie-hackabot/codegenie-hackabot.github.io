        const fetch_from_github = async function() {
			    const token = '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';

                if (!response.ok) {

                }
                const data = await response.json();
				if (typeof window.hash !== 'undefined' && window.hash === data.sha) {
					return;
				}
                window.hash = data.sha;
            } catch (error) {
                console.error('Error fetching commit:', error);
                return;
            }

            const rawUrl = `https://raw.githubusercontent.com/codegenie-hackabot/react-test2/${hash}/dist/index.html?v=${Date.now()}`;
            const baseUrl = rawUrl.substring(0, rawUrl.lastIndexOf('/') + 1); // Directory URL for base tag

            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error');
            const iframe = document.getElementById('content-frame');

            try {
                const response = await fetch(rawUrl);
			    if (!response.ok) {
			      throw new Error(`HTTP error ${response.status}`);
			    }
				
				const content = await response.text();
				
				if (typeof window.html !== 'undefined' && window.html === content) {
					return;
				}

				console.log("Updating DOM")

				window.html = content;

                // Parse the HTML to insert a <base> tag as the first element in <head>
                const parser = new DOMParser();
                const doc = parser.parseFromString(window.html, 'text/html');

                // Create and insert base tag
                const base = doc.createElement('base');
                base.href = baseUrl;
                const head = doc.head;
                if (head.firstChild) {
                    head.insertBefore(base, head.firstChild);
                } else {
                    head.appendChild(base);
                }

                // Serialize back to HTML string
                const modifiedHtml = '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;

                // Create a Blob and generate an object URL
                const blob = new Blob([modifiedHtml], { type: 'text/html' });
                const blobUrl = URL.createObjectURL(blob);

                // Set iframe src to blob URL
                iframe.src = blobUrl;

                // Show iframe when loaded
                iframe.onload = () => {
                    iframe.style.opacity = 1;
                    loadingEl.classList.add('hidden');
                    // Clean up blob URL to free memory
                    URL.revokeObjectURL(blobUrl);
                };

                // Optional: handle iframe load error (e.g., if blob fails)
                iframe.onerror = (err) => {
                    throw new Error('Failed to load content in iframe.');
                };

				// Source - https://stackoverflow.com/a/86771
				// Posted by Ed., modified by community. See post 'Timeline' for change history
				// Retrieved 2026-03-17, License - CC BY-SA 2.5
				// document.getElementById('content-frame').contentWindow.location.reload();


            } catch (err) {
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
                errorEl.textContent = `Error: ${err.message}`;
                console.error(err);
            }
        };
